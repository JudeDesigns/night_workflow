# Night Shift Reports – Nginx server block
# ─────────────────────────────────────────────────────────────────────────────
# Drop this file into /etc/nginx/conf.d/nightshift.conf
# (or include it from your main nginx.conf).
#
# Replace "nightshift.yourdomain.com" with your actual hostname / subdomain.
# For SSL, run: certbot --nginx -d nightshift.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name nightshift.yourdomain.com;

    # ── 1. Frontend static files ──────────────────────────────────────────
    root /opt/night_workflow/frontend/dist;
    index index.html;

    # All routes that are not /api go to the SPA entry-point so React Router
    # can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 2. Backend API proxy ──────────────────────────────────────────────
    # The Vite dev proxy rewrites /api → / before forwarding to uvicorn.
    # Nginx does the same here: strip the /api prefix, pass the rest.
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/;   # trailing slash strips /api
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Uploads can be large Excel files – raise limits to match your data.
        client_max_body_size 64m;

        # Long-running Part 3/4 PDF generation can take 30+ seconds.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── 3. Security headers (optional but recommended) ────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
}
